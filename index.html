<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#B8A9E0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工时记录">
    <link rel="apple-touch-icon" href="icon_192x192.png">
    <meta name="description" content="简洁美观的工时记录管理工具">
    <link rel="manifest" href="manifest.json">
    <title>工时记录小助手⏰</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 主题色 */
            --primary-color: #B8A9E0;
            --secondary-color: #A8E6CF;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.12);
            --success-color: #A8E6CF;
            --danger-color: #ff6b6b;
        }

        /* 深色主题 */
        [data-theme="dark"] {
            --primary-color: #9B89C8;
            --secondary-color: #8FD4B8;
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-dark: #e0e0e0;
            --text-light: #a0a0a0;
            --border-color: #2a2a3e;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ========== 头部样式 ========== */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ========== 按钮样式 ========== */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-dark);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        /* ========== 目标卡片样式 ========== */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .goal-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .goal-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .goal-title {
            font-size: 1.4em;
            color: var(--text-dark);
            font-weight: 600;
        }

        .goal-deadline {
            font-size: 0.9em;
            color: var(--text-light);
            margin-top: 4px;
        }

        .goal-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: transform 0.2s ease;
        }

        .icon-btn:hover {
            transform: scale(1.2);
        }

        /* ========== 进度条样式 ========== */
        .progress-section {
            margin: 20px 0;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            transition: width 0.6s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: var(--text-light);
            margin-top: 8px;
        }

        .progress-percentage {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ========== 弹窗样式 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-hover);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.5em;
            color: var(--text-dark);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: var(--text-dark);
        }

        /* ========== 表单样式 ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: var(--card-bg);
            color: var(--text-dark);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-hint {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
        }

        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .input-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-light);
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .input-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ========== 历史记录样式 ========== */
        .records-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-left: 3px solid var(--primary-color);
            background: var(--bg-color);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background 0.2s ease;
        }

        .record-item:hover {
            background: var(--border-color);
        }

        .record-date {
            font-weight: 500;
            color: var(--text-dark);
        }

        .record-hours {
            font-size: 1.2em;
            color: var(--primary-color);
            font-weight: 600;
        }

        .record-note {
            font-size: 0.9em;
            color: var(--text-light);
            margin-top: 4px;
        }

        .delete-record-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .delete-record-btn:hover {
            opacity: 1;
        }

        /* ========== 提示消息样式 ========== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-hover);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 4px solid var(--success-color);
        }

        .toast.celebration {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 1.1em;
        }

        /* ========== 主题切换按钮 ========== */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-hover);
            font-size: 24px;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
        }

        /* ========== 空状态样式 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            .goals-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .theme-toggle {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
        }

        /* ========== 统计卡片样式 ========== */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* ========== 自定义时间滚动选择器样式 ========== */
        .time-picker-container {
            width: 100%;
            padding: 20px 0;
            background: var(--bg-color);
            border-radius: 12px;
            border: 2px solid var(--border-color);
        }

        .time-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            position: relative;
            gap: 10px;
        }

        /* 中间选中区域高亮 */
        .time-picker::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 44px;
            background: var(--primary-color);
            opacity: 0.1;
            border-radius: 8px;
            pointer-events: none;
            z-index: 1;
        }

        /* 上下渐变遮罩 */
        .time-picker::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                var(--bg-color) 0%,
                transparent 25%,
                transparent 75%,
                var(--bg-color) 100%
            );
            pointer-events: none;
            z-index: 2;
        }

        .time-column {
            flex: 1;
            max-width: 80px;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .time-column-wrapper {
            position: absolute;
            width: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        .time-column-wrapper:active {
            cursor: grabbing;
            transition: none;
        }

        .time-item {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.2s ease;
        }

        .time-item.selected {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 600;
            transform: scale(1.1);
        }

        .time-separator {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            z-index: 3;
            margin: 0 5px;
        }
</style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <h1>工时记录小助手⏰</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openAddGoalModal()">
                ➕ 添加新目标
            </button>
            <button class="btn btn-secondary" onclick="exportToCSV()">
                📊 导出数据
            </button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 目标卡片网格 -->
        <div id="goalsGrid" class="goals-grid">
            <!-- 动态生成目标卡片 -->
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📋</div>
            <h3>还没有目标</h3>
            <p>点击上方"添加新目标"按钮开始记录工时吧！</p>
        </div>
    </div>

    <!-- 添加/编辑目标弹窗 -->
    <div id="goalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="goalModalTitle">添加新目标</h2>
                <button class="close-btn" onclick="closeGoalModal()">&times;</button>
            </div>
            <form id="goalForm" onsubmit="saveGoal(event)">
                <div class="form-group">
                    <label class="form-label">目标名称 *</label>
                    <input type="text" id="goalName" class="form-input" required placeholder="例如：图书馆工时">
                </div>
                <div class="form-group">
                    <label class="form-label">目标总时长 (小时) *</label>
                    <input type="number" id="goalHours" class="form-input" required min="0.5" step="0.5" placeholder="例如：100">
                </div>
                <div class="form-group">
                    <label class="form-label">截止日期 (可选)</label>
                    <input type="date" id="goalDeadline" class="form-input">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeGoalModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加记录弹窗 -->
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加工时记录</h2>
                <button class="close-btn" onclick="closeRecordModal()">&times;</button>
            </div>

            <!-- 输入方式切换 -->
            <div class="input-tabs">
                <button type="button" class="input-tab active" onclick="switchInputTab('calendar', event)">📅 日历选择</button>
                <button type="button" class="input-tab" onclick="switchInputTab('time', event)">⏰ 时间选择</button>
                <button type="button" class="input-tab" onclick="switchInputTab('text', event)">✍️ 文字输入</button>
            </div>

            <!-- 日历输入 -->
            <div id="calendarInput" class="tab-content active">
                <form id="calendarForm" onsubmit="saveRecordFromCalendar(event)">
                    <div class="form-group">
                        <label class="form-label">日期 *</label>
                        <input type="date" id="recordDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">时长 (小时) *</label>
                        <input type="number" id="recordHours" class="form-input" required min="0.1" step="0.1" placeholder="例如：1.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注 (可选)</label>
                        <input type="text" id="recordNote" class="form-input" placeholder="例如：完成第三章阅读">
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" class="btn btn-secondary" onclick="closeRecordModal()">取消</button>
                        <button type="submit" class="btn btn-primary">添加记录</button>
                    </div>
                </form>
            </div>

            <!-- 时间选择输入 -->
            <div id="timeInput" class="tab-content">
                <form id="timeForm" onsubmit="saveRecordFromTime(event)">
                    <div class="form-group">
                        <label class="form-label">日期 *</label>
                        <input type="date" id="timeRecordDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">开始时间 *</label>
                        <div class="time-picker-container">
                            <div class="time-picker" id="startTimePicker">
                                <div class="time-column">
                                    <div class="time-column-wrapper" data-type="hour"></div>
                                </div>
                                <div class="time-separator">:</div>
                                <div class="time-column">
                                    <div class="time-column-wrapper" data-type="minute"></div>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">结束时间 *</label>
                        <div class="time-picker-container">
                            <div class="time-picker" id="endTimePicker">
                                <div class="time-column">
                                    <div class="time-column-wrapper" data-type="hour"></div>
                                </div>
                                <div class="time-separator">:</div>
                                <div class="time-column">
                                    <div class="time-column-wrapper" data-type="minute"></div>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="endTime" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">计算时长</label>
                        <div id="calculatedDuration" style="padding: 12px; background: var(--bg-color); border-radius: 8px; font-size: 1.2em; font-weight: 600; color: var(--primary-color); text-align: center;">
                            请选择开始和结束时间
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注 (可选)</label>
                        <input type="text" id="timeRecordNote" class="form-input" placeholder="例如：完成第三章阅读">
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" class="btn btn-secondary" onclick="closeRecordModal()">取消</button>
                        <button type="submit" class="btn btn-primary">添加记录</button>
                    </div>
                </form>
            </div>

            <!-- 文字输入 -->
            <div id="textInput" class="tab-content">
                <form id="textForm" onsubmit="saveRecordFromText(event)">
                    <div class="form-group">
                        <label class="form-label">快速输入 *</label>
                        <input type="text" id="recordText" class="form-input" placeholder='例如：今天2小时 或 1月15日3.5小时'>
                        <div class="form-hint">
                            支持格式：<br>
                            • "今天 X 小时" 或 "今天 X h"<br>
                            • "昨天 X 小时"<br>
                            • "X月X日 X小时" 或 "X/X X小时"<br>
                            • 可在末尾添加备注，如 "今天2小时 完成阅读"
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" class="btn btn-secondary" onclick="closeRecordModal()">取消</button>
                        <button type="submit" class="btn btn-primary">添加记录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="historyModalTitle">历史记录</h2>
                <button class="close-btn" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div id="recordsList" class="records-list">
                <!-- 动态生成记录列表 -->
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <script>
        // ========== 全局变量 ==========
        let goals = [];
        let currentGoalId = null;
        let editingGoalId = null;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderGoals();
            setDefaultDate();

            // 加载主题设置
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });

        // ========== 数据管理 ==========
        function loadData() {
            const saved = localStorage.getItem('workHourGoals');
            if (saved) {
                goals = JSON.parse(saved);
            }
        }

        function saveData() {
            localStorage.setItem('workHourGoals', JSON.stringify(goals));
        }

        // ========== 目标管理 ==========
        function openAddGoalModal() {
            editingGoalId = null;
            document.getElementById('goalModalTitle').textContent = '添加新目标';
            document.getElementById('goalForm').reset();
            document.getElementById('goalModal').classList.add('active');
        }

        function openEditGoalModal(goalId) {
            editingGoalId = goalId;
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            document.getElementById('goalModalTitle').textContent = '编辑目标';
            document.getElementById('goalName').value = goal.name;
            document.getElementById('goalHours').value = goal.targetHours;
            document.getElementById('goalDeadline').value = goal.deadline || '';
            document.getElementById('goalModal').classList.add('active');
        }

        function closeGoalModal() {
            document.getElementById('goalModal').classList.remove('active');
            document.getElementById('goalForm').reset();
            editingGoalId = null;
        }

        function saveGoal(event) {
            event.preventDefault();

            const name = document.getElementById('goalName').value;
            const targetHours = parseFloat(document.getElementById('goalHours').value);
            const deadline = document.getElementById('goalDeadline').value;

            if (editingGoalId) {
                // 编辑现有目标
                const goal = goals.find(g => g.id === editingGoalId);
                goal.name = name;
                goal.targetHours = targetHours;
                goal.deadline = deadline;
                showToast('目标已更新！', 'success');
            } else {
                // 添加新目标
                const newGoal = {
                    id: Date.now(),
                    name: name,
                    targetHours: targetHours,
                    deadline: deadline,
                    records: []
                };
                goals.push(newGoal);
                showToast('目标已创建！', 'success');
            }

            saveData();
            renderGoals();
            closeGoalModal();
        }

        function deleteGoal(goalId) {
            if (!confirm('确定要删除这个目标吗？所有相关记录也将被删除。')) {
                return;
            }

            goals = goals.filter(g => g.id !== goalId);
            saveData();
            renderGoals();
            showToast('目标已删除', 'success');
        }

        // ========== 工时记录管理 ==========
        function openAddRecordModal(goalId) {
            currentGoalId = goalId;
            setDefaultDate();
            document.getElementById('recordModal').classList.add('active');

            // 添加时间选择的事件监听器
            setupTimeCalculation();
        }

        function closeRecordModal() {
            document.getElementById('recordModal').classList.remove('active');
            document.getElementById('calendarForm').reset();
            document.getElementById('timeForm').reset();
            document.getElementById('textForm').reset();
            document.getElementById('calculatedDuration').textContent = '请选择开始和结束时间';

            // 重置时间选择器
            if (startHourPicker && startMinutePicker && endHourPicker && endMinutePicker) {
                startHourPicker.scrollToIndex(9, false); // 09:00
                startMinutePicker.scrollToIndex(0, false);
                endHourPicker.scrollToIndex(9, false);
                endMinutePicker.scrollToIndex(0, false);
                updateTimeInput('startTime');
                updateTimeInput('endTime');
            }

            currentGoalId = null;
            setDefaultDate();
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('recordDate').value = today;
            document.getElementById('timeRecordDate').value = today;
        }

        function switchInputTab(tab, event) {
            // 切换标签页激活状态
            document.querySelectorAll('.input-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            } else {
                // 如果没有event，手动选择对应的标签
                const tabs = document.querySelectorAll('.input-tab');
                tabs.forEach((btn, index) => {
                    if ((tab === 'calendar' && index === 0) || (tab === 'time' && index === 1) || (tab === 'text' && index === 2)) {
                        btn.classList.add('active');
                    }
                });
            }

            // 切换内容显示
            document.getElementById('calendarInput').classList.remove('active');
            document.getElementById('timeInput').classList.remove('active');
            document.getElementById('textInput').classList.remove('active');

            if (tab === 'calendar') {
                document.getElementById('calendarInput').classList.add('active');
            } else if (tab === 'time') {
                document.getElementById('timeInput').classList.add('active');
            } else {
                document.getElementById('textInput').classList.add('active');
            }
        }

        function saveRecordFromCalendar(event) {
            event.preventDefault();

            const date = document.getElementById('recordDate').value;
            const hours = parseFloat(document.getElementById('recordHours').value);
            const note = document.getElementById('recordNote').value;

            addRecord(currentGoalId, date, hours, note);
        }

        function saveRecordFromText(event) {
            event.preventDefault();

            const text = document.getElementById('recordText').value.trim();
            const parsed = parseTextInput(text);

            if (!parsed) {
                showToast('无法识别输入格式，请检查后重试', 'error');
                return;
            }

            addRecord(currentGoalId, parsed.date, parsed.hours, parsed.note);
        }

        // ========== 时间选择功能 ==========
        // 时间滚动选择器类
        class TimeScrollPicker {
            constructor(container, type, onChange) {
                this.container = container;
                this.type = type; // 'hour' or 'minute'
                this.onChange = onChange;
                this.itemHeight = 44;
                this.visibleItems = 5;
                this.currentIndex = 0;

                // 生成数据
                if (type === 'hour') {
                    this.data = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0'));
                } else {
                    this.data = Array.from({ length: 60 }, (_, i) => String(i).padStart(2, '0'));
                }

                this.init();
            }

            init() {
                // 生成 HTML
                this.container.innerHTML = this.data.map((item, index) =>
                    `<div class="time-item" data-index="${index}">${item}</div>`
                ).join('');

                // 初始化位置
                this.currentIndex = this.type === 'hour' ? 9 : 0; // 默认 09:00
                this.scrollToIndex(this.currentIndex, false);

                // 绑定事件
                this.bindEvents();
            }

            bindEvents() {
                let startY = 0;
                let currentY = 0;
                let startTranslate = 0;
                let isDragging = false;
                let velocity = 0;
                let lastY = 0;
                let lastTime = 0;

                const getTranslateY = () => {
                    const transform = this.container.style.transform;
                    if (!transform) return 0;
                    const match = transform.match(/translateY\(([^)]+)px\)/);
                    return match ? parseFloat(match[1]) : 0;
                };

                const onStart = (e) => {
                    isDragging = true;
                    this.container.style.transition = 'none';

                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    startY = clientY;
                    lastY = clientY;
                    lastTime = Date.now();
                    startTranslate = getTranslateY();
                    velocity = 0;
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    e.preventDefault();

                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    currentY = clientY;
                    const deltaY = currentY - startY;
                    const newTranslate = startTranslate + deltaY;

                    // 计算速度
                    const now = Date.now();
                    const timeDelta = now - lastTime;
                    if (timeDelta > 0) {
                        velocity = (clientY - lastY) / timeDelta;
                    }
                    lastY = clientY;
                    lastTime = now;

                    this.container.style.transform = `translateY(${newTranslate}px)`;
                    this.updateSelection();
                };

                const onEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;

                    this.container.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

                    // 惯性滚动
                    if (Math.abs(velocity) > 0.1) {
                        const inertiaDistance = velocity * 200; // 调整惯性系数
                        const currentTranslate = getTranslateY();
                        const targetTranslate = currentTranslate + inertiaDistance;
                        const targetIndex = this.calculateIndexFromTranslate(targetTranslate);
                        this.scrollToIndex(targetIndex);
                    } else {
                        // 对齐到最近的项
                        const currentTranslate = getTranslateY();
                        const targetIndex = this.calculateIndexFromTranslate(currentTranslate);
                        this.scrollToIndex(targetIndex);
                    }
                };

                // 鼠标事件
                this.container.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);

                // 触摸事件
                this.container.addEventListener('touchstart', onStart, { passive: false });
                this.container.addEventListener('touchmove', onMove, { passive: false });
                this.container.addEventListener('touchend', onEnd);
            }

            calculateIndexFromTranslate(translate) {
                const centerOffset = (this.itemHeight * (this.visibleItems - 1)) / 2;
                const index = Math.round((centerOffset - translate) / this.itemHeight);
                return Math.max(0, Math.min(this.data.length - 1, index));
            }

            scrollToIndex(index, animated = true) {
                index = Math.max(0, Math.min(this.data.length - 1, index));
                this.currentIndex = index;

                const centerOffset = (this.itemHeight * (this.visibleItems - 1)) / 2;
                const translate = centerOffset - (index * this.itemHeight);

                if (animated) {
                    this.container.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                } else {
                    this.container.style.transition = 'none';
                }

                this.container.style.transform = `translateY(${translate}px)`;
                this.updateSelection();

                if (this.onChange) {
                    this.onChange(this.data[index]);
                }
            }

            updateSelection() {
                const items = this.container.querySelectorAll('.time-item');
                const currentTranslate = parseFloat(this.container.style.transform?.match(/translateY\(([^)]+)px\)/)?.[1] || 0);
                const centerOffset = (this.itemHeight * (this.visibleItems - 1)) / 2;

                items.forEach((item, index) => {
                    const itemTranslate = centerOffset - (index * this.itemHeight);
                    const distance = Math.abs(currentTranslate - itemTranslate);

                    if (distance < this.itemHeight / 2) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }

            getValue() {
                return this.data[this.currentIndex];
            }

            setValue(value) {
                const index = this.data.indexOf(String(value).padStart(2, '0'));
                if (index !== -1) {
                    this.scrollToIndex(index, false);
                }
            }
        }

        // 初始化时间选择器实例
        let startHourPicker, startMinutePicker, endHourPicker, endMinutePicker;

        function initializeTimePickers() {
            const startPicker = document.getElementById('startTimePicker');
            const endPicker = document.getElementById('endTimePicker');

            if (!startPicker || !endPicker) return;

            // 开始时间选择器
            const startHourWrapper = startPicker.querySelector('[data-type="hour"]');
            const startMinuteWrapper = startPicker.querySelector('[data-type="minute"]');

            startHourPicker = new TimeScrollPicker(startHourWrapper, 'hour', () => {
                updateTimeInput('startTime');
                calculateTimeDuration();
            });

            startMinutePicker = new TimeScrollPicker(startMinuteWrapper, 'minute', () => {
                updateTimeInput('startTime');
                calculateTimeDuration();
            });

            // 结束时间选择器
            const endHourWrapper = endPicker.querySelector('[data-type="hour"]');
            const endMinuteWrapper = endPicker.querySelector('[data-type="minute"]');

            endHourPicker = new TimeScrollPicker(endHourWrapper, 'hour', () => {
                updateTimeInput('endTime');
                calculateTimeDuration();
            });

            endMinutePicker = new TimeScrollPicker(endMinuteWrapper, 'minute', () => {
                updateTimeInput('endTime');
                calculateTimeDuration();
            });

            // 初始化时间值
            updateTimeInput('startTime');
            updateTimeInput('endTime');
        }

        function updateTimeInput(inputId) {
            let hour, minute;

            if (inputId === 'startTime') {
                hour = startHourPicker.getValue();
                minute = startMinutePicker.getValue();
            } else {
                hour = endHourPicker.getValue();
                minute = endMinutePicker.getValue();
            }

            document.getElementById(inputId).value = `${hour}:${minute}`;
        }

        function setupTimeCalculation() {
            // 初始化时间选择器
            initializeTimePickers();
        }

        function calculateTimeDuration() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const durationDisplay = document.getElementById('calculatedDuration');

            if (!startTime || !endTime) {
                durationDisplay.textContent = '请选择开始和结束时间';
                return;
            }

            // 解析时间
            const [startHour, startMinute] = startTime.split(':').map(Number);
            const [endHour, endMinute] = endTime.split(':').map(Number);

            // 计算分钟差
            let totalMinutes = (endHour * 60 + endMinute) - (startHour * 60 + startMinute);

            // 如果结束时间早于开始时间，认为是跨天
            if (totalMinutes < 0) {
                totalMinutes += 24 * 60;
            }

            // 转换为小时
            const hours = totalMinutes / 60;

            if (hours <= 0) {
                durationDisplay.textContent = '结束时间必须晚于开始时间';
                return;
            }

            // 显示计算结果
            const hoursInt = Math.floor(hours);
            const minutes = Math.round((hours - hoursInt) * 60);

            if (minutes === 0) {
                durationDisplay.textContent = `${hoursInt} 小时`;
            } else {
                durationDisplay.textContent = `${hoursInt} 小时 ${minutes} 分钟 (${hours.toFixed(2)} 小时)`;
            }
        }

        function saveRecordFromTime(event) {
            event.preventDefault();

            const date = document.getElementById('timeRecordDate').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const note = document.getElementById('timeRecordNote').value;

            if (!startTime || !endTime) {
                showToast('请选择开始和结束时间', 'error');
                return;
            }

            // 计算时长
            const [startHour, startMinute] = startTime.split(':').map(Number);
            const [endHour, endMinute] = endTime.split(':').map(Number);
            let totalMinutes = (endHour * 60 + endMinute) - (startHour * 60 + startMinute);

            if (totalMinutes < 0) {
                totalMinutes += 24 * 60;
            }

            const hours = totalMinutes / 60;

            if (hours <= 0) {
                showToast('结束时间必须晚于开始时间', 'error');
                return;
            }

            // 添加记录，包含时间信息
            addRecord(currentGoalId, date, hours, note, startTime, endTime);
        }

        // 文字识别解析
        function parseTextInput(text) {
            const today = new Date();
            let date, hours, note = '';

            // 匹配 "今天 X 小时" 或 "今天 X h"
            let match = text.match(/今天\s*(\d+(?:\.\d+)?)\s*(?:小时|h)/i);
            if (match) {
                hours = parseFloat(match[1]);
                date = formatDate(today);
                // 提取备注（匹配内容后面的文字）
                note = text.substring(match.index + match[0].length).trim();
                return { date, hours, note };
            }

            // 匹配 "昨天 X 小时"
            match = text.match(/昨天\s*(\d+(?:\.\d+)?)\s*(?:小时|h)/i);
            if (match) {
                hours = parseFloat(match[1]);
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                date = formatDate(yesterday);
                note = text.substring(match.index + match[0].length).trim();
                return { date, hours, note };
            }

            // 匹配 "X月X日 X小时" 或 "X/X X小时"
            match = text.match(/(\d+)[月\/](\d+)(?:日)?\s*(\d+(?:\.\d+)?)\s*(?:小时|h)/i);
            if (match) {
                const month = parseInt(match[1]);
                const day = parseInt(match[2]);
                hours = parseFloat(match[3]);

                const targetDate = new Date(today.getFullYear(), month - 1, day);
                // 如果日期在未来，则认为是去年的日期
                if (targetDate > today) {
                    targetDate.setFullYear(targetDate.getFullYear() - 1);
                }
                date = formatDate(targetDate);
                note = text.substring(match.index + match[0].length).trim();
                return { date, hours, note };
            }

            return null;
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function addRecord(goalId, date, hours, note, startTime = null, endTime = null) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            const newRecord = {
                id: Date.now(),
                date: date,
                hours: hours,
                note: note
            };

            // 如果提供了时间信息，则添加到记录中
            if (startTime && endTime) {
                newRecord.startTime = startTime;
                newRecord.endTime = endTime;
            }

            goal.records.push(newRecord);

            // 按日期排序
            goal.records.sort((a, b) => new Date(b.date) - new Date(a.date));

            saveData();
            renderGoals();
            closeRecordModal();

            // 检查是否达到里程碑
            checkMilestone(goal);

            showToast(`已添加 ${hours.toFixed(2)} 小时工时记录`, 'success');
        }

        function deleteRecord(goalId, recordId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            goal.records = goal.records.filter(r => r.id !== recordId);
            saveData();
            renderGoals();

            // 如果历史记录弹窗是打开的，刷新它
            if (document.getElementById('historyModal').classList.contains('active')) {
                showHistory(goalId);
            }

            showToast('记录已删除', 'success');
        }

        // ========== 里程碑检查 ==========
        function checkMilestone(goal) {
            const totalHours = calculateTotalHours(goal);
            const percentage = (totalHours / goal.targetHours) * 100;

            const milestones = [
                { threshold: 25, message: '已完成 25%！继续加油！🎯' },
                { threshold: 50, message: '已过半！你真棒！🌟' },
                { threshold: 75, message: '75% 完成！胜利在望！🚀' },
                { threshold: 100, message: '🎉 恭喜完成目标！你太棒了！🎊' }
            ];

            // 检查之前的记录，看看是否刚好跨越里程碑
            const previousTotal = totalHours - goal.records[0].hours;
            const previousPercentage = (previousTotal / goal.targetHours) * 100;

            for (const milestone of milestones) {
                if (previousPercentage < milestone.threshold && percentage >= milestone.threshold) {
                    setTimeout(() => {
                        showToast(milestone.message, 'celebration');
                    }, 500);
                    break;
                }
            }
        }

        // ========== 渲染函数 ==========
        function renderGoals() {
            const grid = document.getElementById('goalsGrid');
            const emptyState = document.getElementById('emptyState');

            if (goals.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = goals.map(goal => {
                const totalHours = calculateTotalHours(goal);
                const percentage = Math.min((totalHours / goal.targetHours) * 100, 100);
                const remaining = Math.max(goal.targetHours - totalHours, 0);

                return `
                    <div class="goal-card">
                        <div class="goal-header">
                            <div>
                                <div class="goal-title">${escapeHtml(goal.name)}</div>
                                ${goal.deadline ? `<div class="goal-deadline">截止：${formatDeadline(goal.deadline)}</div>` : ''}
                            </div>
                            <div class="goal-actions">
                                <button class="icon-btn" onclick="openEditGoalModal(${goal.id})" title="编辑">✏️</button>
                                <button class="icon-btn" onclick="deleteGoal(${goal.id})" title="删除">🗑️</button>
                            </div>
                        </div>

                        <div class="progress-section">
                            <div class="progress-percentage">${percentage.toFixed(1)}%</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: ${percentage}%"></div>
                            </div>
                            <div class="progress-stats">
                                <span>${totalHours.toFixed(1)} / ${goal.targetHours} 小时</span>
                                <span>剩余 ${remaining.toFixed(1)} 小时</span>
                            </div>
                        </div>

                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="stat-value">${goal.records.length}</div>
                                <div class="stat-label">记录数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${totalHours > 0 ? (totalHours / goal.records.length).toFixed(1) : 0}</div>
                                <div class="stat-label">平均时长</div>
                            </div>
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button class="btn btn-primary" style="flex: 1;" onclick="openAddRecordModal(${goal.id})">
                                ➕ 添加记录
                            </button>
                            <button class="btn btn-secondary" style="flex: 1;" onclick="showHistory(${goal.id})">
                                📋 历史记录
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateTotalHours(goal) {
            return goal.records.reduce((sum, record) => sum + record.hours, 0);
        }

        function formatDeadline(deadline) {
            const date = new Date(deadline);
            const today = new Date();
            const diffTime = date - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let dateStr = date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

            if (diffDays < 0) {
                return `${dateStr} (已过期)`;
            } else if (diffDays === 0) {
                return `${dateStr} (今天)`;
            } else if (diffDays <= 7) {
                return `${dateStr} (${diffDays}天后)`;
            } else {
                return dateStr;
            }
        }

        function showHistory(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            document.getElementById('historyModalTitle').textContent = `${goal.name} - 历史记录`;

            const recordsList = document.getElementById('recordsList');

            if (goal.records.length === 0) {
                recordsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>还没有记录</p></div>';
            } else {
                recordsList.innerHTML = goal.records.map(record => `
                    <div class="record-item">
                        <div style="flex: 1;">
                            <div class="record-date">${formatRecordDate(record.date)}</div>
                            ${record.startTime && record.endTime ? `<div class="record-note" style="color: var(--primary-color);">⏰ ${record.startTime} - ${record.endTime}</div>` : ''}
                            ${record.note ? `<div class="record-note">${escapeHtml(record.note)}</div>` : ''}
                        </div>
                        <div class="record-hours">${record.hours.toFixed(2)} h</div>
                        <button class="delete-record-btn" onclick="deleteRecord(${goalId}, ${record.id})" title="删除">✕</button>
                    </div>
                `).join('');
            }

            document.getElementById('historyModal').classList.add('active');
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.remove('active');
        }

        function formatRecordDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            const dateOnly = (d) => d.toISOString().split('T')[0];

            if (dateOnly(date) === dateOnly(today)) {
                return '今天';
            } else if (dateOnly(date) === dateOnly(yesterday)) {
                return '昨天';
            } else {
                return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
            }
        }

        // ========== 数据导出 ==========
        function exportToCSV() {
            if (goals.length === 0) {
                showToast('没有数据可以导出', 'error');
                return;
            }

            let csv = '\uFEFF'; // UTF-8 BOM for Excel
            csv += '目标名称,日期,时长(小时),备注,目标总时长,截止日期\n';

            goals.forEach(goal => {
                goal.records.forEach(record => {
                    csv += `"${goal.name}","${record.date}","${record.hours}","${record.note || ''}","${goal.targetHours}","${goal.deadline || ''}"\n`;
                });
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `工时记录_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('数据已导出为 CSV 文件', 'success');
        }

        // ========== 主题切换 ==========
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            showToast(`已切换到${newTheme === 'dark' ? '深色' : '浅色'}模式`, 'success');
        }

        // ========== 提示消息 ==========
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击弹窗外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // ========== PWA Service Worker 注册 ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker 注册成功:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker 注册失败:', error);
                    });
            });
        }

        // 提示用户安装PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            // 显示安装提示（3秒后）
            setTimeout(() => {
                if (deferredPrompt && !localStorage.getItem('pwa-dismissed')) {
                    const install = confirm('💡 将"工时记录小助手"添加到主屏幕，像原生应用一样使用？\n\n✅ 离线可用\n✅ 快速启动\n✅ 全屏体验');
                    if (install) {
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then((choiceResult) => {
                            if (choiceResult.outcome === 'accepted') {
                                console.log('用户接受了安装');
                            }
                            deferredPrompt = null;
                        });
                    } else {
                        localStorage.setItem('pwa-dismissed', 'true');
                    }
                }
            }, 3000);
        });
    </script>
</body>
